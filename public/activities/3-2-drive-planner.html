<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection Drive Planner | Skilizee E-Waste</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --page-bg: #f8fafc;
            --surface: #ffffff;
            --primary: #c17cff;
            --text-primary: #1e293b;
        }

        body {
            background-color: var(--page-bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; font-weight: 700; }

        .header-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }

        .topic-card {
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .choice-btn {
            padding: 1.25rem;
            border-radius: 16px;
            border: 2px solid transparent;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }
        .choice-btn:hover { transform: translateY(-2px); border-color: #e2e8f0; }
        .choice-btn.active {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(193, 124, 255, 0.15);
        }

        .meter-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(to right, #f3a44a, #c17cff, #2bc1a6);
        }

        .fullscreen-btn {
             top: 24px; right: 24px; z-index: 100;
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #1e293b, #334155);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            cursor: pointer; border: 0;
        }

        .is-embedded main { padding-top: 2rem; }

        .status-badge {
            padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <main class="relative max-w-6xl mx-auto px-6 space-y-8 pb-20">
    <button class="fullscreen-btn" id="toggle-fullscreen" style="position: absolute; top: 16px; right: 16px; z-index: 100;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
        </svg>
    </button>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Planning Lanes -->
            <div class="lg:col-span-2 space-y-8">
                <section class="topic-card p-8">
                    <h3 class="text-xl font-bold mb-6">1. Venue Selection</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="venue-grid">
                        <button class="choice-btn" data-category="venue" data-id="school" data-score="20">
                            <span class="text-2xl mb-2 block">🏫</span>
                            <div class="font-bold">Local School</div>
                            <p class="text-xs text-slate-500 mt-1">High participation, easy access for students/parents.</p>
                        </button>
                        <button class="choice-btn" data-category="venue" data-id="park" data-score="15">
                            <span class="text-2xl mb-2 block">🌳</span>
                            <div class="font-bold">Public Park</div>
                            <p class="text-xs text-slate-500 mt-1">Visible to general public but harder to coordinate power.</p>
                        </button>
                    </div>
                </section>

                <section class="topic-card p-8">
                    <h3 class="text-xl font-bold mb-6">2. Recycler Partner</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="partner-grid">
                        <button class="choice-btn" data-category="partner" data-id="authorized" data-score="30">
                            <span class="text-2xl mb-2 block">✅</span>
                            <div class="font-bold">Certified Recycler</div>
                            <p class="text-xs text-slate-500 mt-1">Full documentation and environmentally safe processing.</p>
                        </button>
                        <button class="choice-btn" data-category="partner" data-id="local" data-score="10">
                            <span class="text-2xl mb-2 block">📦</span>
                            <div class="font-bold">General Scrap Yard</div>
                            <p class="text-xs text-slate-500 mt-1">Convenient pickup but lacks formal e-waste permits.</p>
                        </button>
                    </div>
                </section>

                <section class="topic-card p-8">
                    <h3 class="text-xl font-bold mb-6">3. Sorting Strategy</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="bins-grid">
                        <button class="choice-btn" data-category="bins" data-id="multi" data-score="25">
                            <span class="text-2xl mb-2 block">🗂️</span>
                            <div class="font-bold">Multi-Category Bins</div>
                            <p class="text-xs text-slate-500 mt-1">Separate bins for batteries, IT, and household tech.</p>
                        </button>
                        <button class="choice-btn" data-category="bins" data-id="single" data-score="5">
                            <span class="text-2xl mb-2 block">🗑️</span>
                            <div class="font-bold">Single Large Container</div>
                            <p class="text-xs text-slate-500 mt-1">Higher risk of damage and toxic cross-contamination.</p>
                        </button>
                    </div>
                </section>
            </div>

            <!-- Dashboard -->
            <div class="space-y-6">
                <div class="topic-card p-8 sticky top-8">
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Launch Readiness</div>
                    <div class="text-5xl font-bold mb-4" id="score-text">0%</div>
                    
                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden mb-8">
                        <div id="score-bar" class="meter-fill" style="width: 0%"></div>
                    </div>

                    <div class="space-y-6" id="feedback-panel">
                        <div class="p-4 bg-slate-50 rounded-xl">
                            <h4 class="text-sm font-bold mb-1" id="feedback-title">Awaiting Choices</h4>
                            <p class="text-xs text-slate-500 leading-relaxed" id="feedback-desc">
                                Select a venue, partner, and sorting strategy to calculate your drive's potential impact.
                            </p>
                        </div>
                        
                        <div class="pt-6 border-t border-slate-100 space-y-4">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-medium text-slate-500">Environmental Score</span>
                                <span class="status-badge bg-slate-100 text-slate-400" id="env-badge">TBD</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-medium text-slate-500">Community Outreach</span>
                                <span class="status-badge bg-slate-100 text-slate-400" id="outreach-badge">TBD</span>
                            </div>
                        </div>

                        <button id="launch-btn" class="w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-bold text-sm cursor-not-allowed transition-all">
                            LAUNCH SIMULATION
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const state = {
            venue: null,
            partner: null,
            bins: null
        };

        function init() {
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.dataset.category;
                    const id = btn.dataset.id;
                    
                    // Update state
                    state[cat] = id;
                    
                    // Update UI
                    document.querySelectorAll(`[data-category="${cat}"]`).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    calculate();
                });
            });

            document.getElementById('toggle-fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            });
        }

        function calculate() {
            let total = 0;
            const choices = Object.values(state);
            const activeChoices = choices.filter(c => c !== null);
            
            activeChoices.forEach(id => {
                const btn = document.querySelector(`[data-id="${id}"]`);
                total += parseInt(btn.dataset.score);
            });

            // Normalize to 100% (max possible is 20+30+25 = 75 in this simplified version, let's boost it)
            const score = Math.round((total / 75) * 100);
            
            document.getElementById('score-text').textContent = score + '%';
            document.getElementById('score-bar').style.width = score + '%';

            updateFeedback(score);
        }

        function updateFeedback(score) {
            const title = document.getElementById('feedback-title');
            const desc = document.getElementById('feedback-desc');
            const launchBtn = document.getElementById('launch-btn');
            const envBadge = document.getElementById('env-badge');
            
            if (score < 40) {
                title.textContent = 'High Operational Risk';
                desc.textContent = 'Your plan lacks a certified partner or a safe sorting strategy. This could lead to landfill leakage.';
                envBadge.className = 'status-badge bg-rose-100 text-rose-600';
                envBadge.textContent = 'POOR';
            } else if (score < 80) {
                title.textContent = 'Functional Draft';
                desc.textContent = 'A solid foundation. Ensure your outreach messaging is clear to boost volume.';
                envBadge.className = 'status-badge bg-amber-100 text-amber-600';
                envBadge.textContent = 'STABLE';
            } else {
                title.textContent = 'Launch Ready';
                desc.textContent = 'Perfect! You have selected high-visibility venues and high-integrity processing partners.';
                envBadge.className = 'status-badge bg-emerald-100 text-emerald-600';
                envBadge.textContent = 'EXCELLENT';
                
                launchBtn.classList.remove('bg-slate-100', 'text-slate-400', 'cursor-not-allowed');
                launchBtn.classList.add('bg-emerald-500', 'text-white', 'hover:bg-emerald-600', 'shadow-lg');
            }
        }

        init();
    </script>

    <script>
        // Robust Fullscreen functionality
        document.getElementById('toggle-fullscreen')?.addEventListener('click', async () => {
            try {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    const el = document.documentElement;
                    if (el.requestFullscreen) await el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
                    else if (el.msRequestFullscreen) await el.msRequestFullscreen();
                } else {
                    if (document.exitFullscreen) await document.exitFullscreen();
                    else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
                    else if (document.msExitFullscreen) await document.msExitFullscreen();
                }
            } catch (err) {
                console.warn("Fullscreen request failed. This usually happens if the activity is embedded and permissions are blocked.", err);
            }
        });

        // Embedded mode detection
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('embedded') === 'true') {
            document.body.classList.add('is-embedded');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazardous Material Sort | Skilizee E-Waste</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; overflow: hidden; }
        
        #canvas-container { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
        }

        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        .ui-panel {
            pointer-events: auto;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .header-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            padding: 24px;
            max-width: 380px;
        }

        .score-panel {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            max-width: calc(100vw - 220px);
            padding: 12px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .bin-label {
            position: absolute;
            bottom: 40px;
            width: 200px;
            text-align: center;
            padding: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .bin-toxic {
            left: 15%;
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.1);
        }

        .bin-safe {
            right: 15%;
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.1);
        }

        .instruction-toast {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fullscreen-btn {
            position: absolute; top: 24px; right: 24px; z-index: 100;
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1); color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            pointer-events: auto;
        }
        .fullscreen-btn:hover { background: rgba(255, 255, 255, 0.1); }

        /* Animation for correct/incorrect */
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .flash-green { animation: pulse-green 0.5s ease-out; }
        .flash-red { animation: pulse-red 0.5s ease-out; }

        .item-info-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -180px);
            text-align: center;
            pointer-events: none;
            width: 300px;
        }
        .item-info-panel h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }
        .item-info-panel p {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }

    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-layer">
        <button class="fullscreen-btn" id="fs-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </button>

        <div class="ui-panel header-panel">
            <div class="text-[10px] font-bold text-red-400 uppercase tracking-widest mb-2">Module 2.3 • Hazard Control</div>
            <h1 class="text-2xl font-bold mb-2">Toxic Sorting</h1>
            <p class="text-sm text-slate-400 leading-relaxed">Sort e-waste components before processing. Toxic materials like lead, mercury, and cadmium must be isolated.</p>
        </div>

        <div class="ui-panel score-panel" id="score-container">
            <div class="text-center">
                <div class="text-[10px] font-bold text-slate-500 uppercase">Score</div>
                <div class="text-2xl font-bold text-white" id="score">000</div>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="text-center">
                <div class="text-[10px] font-bold text-slate-500 uppercase">Level</div>
                <div class="text-2xl font-bold text-blue-400">1</div>
            </div>
        </div>

        <div class="ui-panel bin-label bin-toxic">Toxic Waste</div>
        <div class="ui-panel bin-label bin-safe">Recyclable</div>

        <div class="item-info-panel" id="item-info">
            <h2 id="item-name">Loading...</h2>
            <p id="item-desc">Please wait</p>
        </div>

        <div class="instruction-toast">
            Use <span class="text-white font-bold">← Arrow</span> for Toxic, <span class="text-white font-bold">Arrow →</span> for Safe
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Game Data
        const items = [
            { id: 'battery', name: 'Leaking Battery', isToxic: true, color: '#ef4444', desc: 'Contains Lead and Acid' },
            { id: 'crt', name: 'CRT Glass', isToxic: true, color: '#991b1b', desc: 'Phosphor and Lead-glass' },
            { id: 'alu', name: 'Aluminum Case', isToxic: false, color: '#94a3b8', desc: 'Clean Recyclable Metal' },
            { id: 'cable', name: 'Copper Wiring', isToxic: false, color: '#b45309', desc: 'High-value Copper' },
            { id: 'board', name: 'Clean Circuit', isToxic: false, color: '#059669', desc: 'Precious Metals' },
            { id: 'bulb', name: 'Mercury Switch', isToxic: true, color: '#7f1d1d', desc: 'High Mercury Content' }
        ];

        let scene, camera, renderer, controls;
        let currentItemMesh = null;
        let currentItemData = null;
        let score = 0;
        let isTransitioning = false;

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0f172a, 0.05);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 5, 5);
            scene.add(mainLight);

            const redRim = new THREE.PointLight(0xef4444, 2, 10);
            redRim.position.set(-6, 0, 0);
            scene.add(redRim);

            const greenRim = new THREE.PointLight(0x10b981, 2, 10);
            greenRim.position.set(6, 0, 0);
            scene.add(greenRim);

            // Bins (Visual only)
            createBin(-4, 0xef4444);
            createBin(4, 0x10b981);

            spawn();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', handleInput);
            
            document.getElementById('fs-btn').onclick = () => {
                if(!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };

            animate();
        }

        function createBin(x, color) {
            const geo = new THREE.BoxGeometry(2, 0.2, 2);
            const mat = new THREE.MeshStandardMaterial({ color, transparent: true, opacity: 0.3 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, -2, 0);
            scene.add(mesh);

            // Glow ring
            const ringGeo = new THREE.RingGeometry(1.2, 1.3, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.set(x, -1.95, 0);
            scene.add(ring);
        }

        function spawn() {
            if (currentItemMesh) scene.remove(currentItemMesh);
            
            currentItemData = items[Math.floor(Math.random() * items.length)];
            
            // UI Update
            document.getElementById('item-name').textContent = currentItemData.name;
            document.getElementById('item-desc').textContent = currentItemData.desc;
            
            // Create a representative mesh
            const group = new THREE.Group();
            
            if (currentItemData.id === 'battery') {
                const geo = new THREE.BoxGeometry(1, 1.6, 0.8);
                const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x333333 }));
                group.add(mesh);
                const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: 0xef4444 }));
                cap.position.y = 0.9;
                group.add(cap);
            } else if (currentItemData.id === 'crt') {
                const geo = new THREE.BoxGeometry(1.8, 1.4, 1.4);
                const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x222222 }));
                group.add(mesh);
                const front = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.2), new THREE.MeshStandardMaterial({ color: 0x334155, emissive: 0x1e293b }));
                front.position.z = 0.71;
                group.add(front);
            } else if (currentItemData.id === 'bulb') {
                const geo = new THREE.SphereGeometry(0.6, 16, 16);
                const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 }));
                group.add(mesh);
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.6), new THREE.MeshStandardMaterial({ color: 0x94a3b8 }));
                base.position.y = -0.7;
                group.add(base);
            } else {
                const geometry = new THREE.IcosahedronGeometry(1.2, 0);
                const material = new THREE.MeshStandardMaterial({ 
                    color: currentItemData.color,
                    roughness: 0.3,
                    metalness: 0.7
                });
                group.add(new THREE.Mesh(geometry, material));
            }
            
            currentItemMesh = group;
            currentItemMesh.position.set(0, 10, 0); // Drop from top
            scene.add(currentItemMesh);

            gsap.to(currentItemMesh.position, {
                y: 0,
                duration: 0.8,
                ease: "bounce.out",
                onComplete: () => { isTransitioning = false; }
            });
        }

        function handleInput(e) {
            if (isTransitioning || !currentItemMesh) return;

            if (e.key === 'ArrowLeft') sortItem(true);
            else if (e.key === 'ArrowRight') sortItem(false);
        }

        function sortItem(toToxic) {
            isTransitioning = true;
            const isCorrect = toToxic === currentItemData.isToxic;
            
            if (isCorrect) {
                score += 10;
                flashFeedback('green');
            } else {
                score = Math.max(0, score - 5);
                flashFeedback('red');
            }

            document.getElementById('score').textContent = score.toString().padStart(3, '0');

            // Animate item flying to bin
            gsap.to(currentItemMesh.position, {
                x: toToxic ? -4 : 4,
                y: -2,
                duration: 0.5,
                ease: "power2.in",
                onComplete: () => {
                    spawn();
                }
            });

            gsap.to(currentItemMesh.scale, {
                x: 0.1, y: 0.1, z: 0.1, duration: 0.5
            });
        }

        function flashFeedback(type) {
            const container = document.getElementById('score-container');
            const className = type === 'green' ? 'flash-green' : 'flash-red';
            container.classList.add(className);
            setTimeout(() => container.classList.remove(className), 500);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (currentItemMesh) {
                currentItemMesh.rotation.y += 0.01;
                currentItemMesh.rotation.z += 0.005;
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>

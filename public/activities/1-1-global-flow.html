<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global E-Waste Flow | 3D Globe | Skilizee</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root {
            --page-bg: #07111b;
            --surface: rgba(13, 25, 41, 0.85);
            --primary: #61b8ff;
            --accent: #2bc1a6;
            --danger: #ff6f61;
            --text: #edf5ff;
            --muted: #7d90a5;
        }

        body {
            background-color: var(--page-bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #globe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .ui-layer * {
            pointer-events: auto;
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(147, 202, 255, 0.15);
            border-radius: 16px;
        }

        #info-panel {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            width: 320px;
            transform: translateX(400px);
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #info-panel.active {
            transform: translateX(0);
        }

        .control-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--muted);
        }

        .control-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(97, 184, 255, 0.4);
        }

        .hotspot-label {
            font-family: 'Poppins', sans-serif;
            background: rgba(0,0,0,0.8);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            background: #07111b;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(97, 184, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Fullscreen btn */
        .fullscreen-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 100;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-sm font-medium tracking-widest uppercase">Initializing Globe...</p>
    </div>

    <div id="globe-container"></div>

    <div class="ui-layer p-6">
        <header class="flex justify-between items-start">
            <div class="glass-panel p-4 px-6">
                <h1 class="text-xl font-bold font-['Poppins']">Global E-Waste Flow</h1>
                <p class="text-xs text-[var(--muted)]">Interactive 3D Waste Migration Map</p>
            </div>
            
            <button class="fullscreen-btn" id="toggle-fullscreen" title="Toggle Fullscreen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>
        </header>

        <div class="mt-auto flex flex-col items-start gap-4 pb-8">
            <div class="glass-panel p-4 flex flex-col gap-3">
                <p class="text-xs font-bold uppercase tracking-wider text-[var(--muted)] mb-1">Filter Flows</p>
                <div class="flex gap-2">
                    <button class="control-btn active" data-flow="all">All Flows</button>
                    <button class="control-btn" data-flow="formal">Formal</button>
                    <button class="control-btn" data-flow="informal">Informal</button>
                </div>
                
                <div class="flex items-center gap-6 mt-2 pt-2 border-t border-white/5">
                    <div class="flex items-center gap-2">
                        <div class="legend-dot bg-[var(--primary)]"></div>
                        <span class="text-[10px] uppercase font-bold text-[var(--muted)]">High Vol. Export</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="legend-dot bg-[var(--danger)]"></div>
                        <span class="text-[10px] uppercase font-bold text-[var(--muted)]">Informal Hotspot</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="info-panel" class="glass-panel p-6">
            <button id="close-info" class="absolute top-4 right-4 text-[var(--muted)] hover:text-white">&times;</button>
            <span class="text-[var(--accent)] text-[10px] font-bold uppercase tracking-widest" id="info-region">West Africa</span>
            <h3 class="text-xl font-bold mb-3" id="info-title">Agbogbloshie, Ghana</h3>
            <p class="text-sm text-[var(--muted)] leading-relaxed mb-6" id="info-desc">
                Description of the impact and flow in this region.
            </p>
            
            <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-4">
                <div>
                    <p class="text-[10px] text-[var(--muted)] uppercase font-bold">Labor Force</p>
                    <p class="text-lg font-bold" id="stat-labor">40,000+</p>
                </div>
                <div>
                    <p class="text-[10px] text-[var(--muted)] uppercase font-bold">Health Impact</p>
                    <p class="text-lg font-bold text-[var(--danger)]" id="stat-impact">Critical</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./1-1-global-flow.js"></script>
</body>
</html>
